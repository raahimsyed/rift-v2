<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rift v2 / games / fyinx</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/fonts.css">
  <link rel="stylesheet" href="../../assets/css/games.css">
</head>
<body data-library-name="fyinx" data-library-meta="fyinx">
  <header class="topbar">
    <div class="topbar-left">rift /games /fyinx</div>
    <div class="topbar-center">
      <div class="topbar-search" aria-label="fyinx search">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        <input id="librarySearch" type="text" placeholder="Search fyinx games..." autocomplete="off" spellcheck="false" aria-label="Search fyinx games">
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="backToGames" type="button" aria-label="Back to games">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      </button>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <section class="collection" aria-label="fyinx library">
        <div class="section-title">fyinx library</div>
        <div class="subsection-title" id="libraryCount">loading...</div>
        <div class="empty" id="libraryEmpty">
          loading...
          <span class="empty-hint">if this stays, fyinx/games.json failed to load.</span>
        </div>
        <div class="grid" id="libraryGrid" hidden></div>
      </section>
    </section>
  </main>

  <script defer src="../../assets/js/library-catalog.js"></script>
</body>
</html>
