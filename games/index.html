<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rift v2 / games</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/fonts.css">
  <link rel="stylesheet" href="../assets/css/games.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">rift /games</div>
    <div class="topbar-center">
      <div class="topbar-search" aria-label="Games search">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        <input id="gamesSearch" type="text" placeholder="Search games, sources..." autocomplete="off" spellcheck="false" aria-label="Search games">
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="backToRift" type="button" aria-label="Back to rift">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      </button>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="layout">
        <aside class="sources" aria-label="Game sources">
          <div class="section-title">sources</div>
          <div class="source-list" id="sourceList" aria-live="polite"></div>
        </aside>

        <section class="collection" aria-label="Game collection">
          <div class="section-title">games</div>
          <div class="subsection-title">fnf mods</div>
          <div class="empty" id="gamesEmpty">
            loading...
            <span class="empty-hint">if this stays, fnf-mods.json failed to load.</span>
          </div>
          <div class="grid" id="gamesGrid" hidden></div>
        </section>
      </div>
    </section>
  </main>

  <script defer src="../assets/js/games.js"></script>
</body>
</html>
