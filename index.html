<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rift V2 Custom Concept</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./assets/css/fonts.css">
  <link rel="stylesheet" href="./assets/css/home.css">
</head>
<body>
  <canvas id="cometCanvas" aria-hidden="true"></canvas>
  <div class="nav-curtain" id="navCurtain" aria-hidden="true"></div>

  <div class="home-app" id="homeApp">
    <div class="top-section">
      <div class="top-left">rift /home</div>
      <div class="top-center">
        <div class="tabbar" role="tablist" aria-label="Rift tabs">
          <button class="tab" type="button" id="tab-1" role="tab" aria-selected="true" data-tab="1">rift 1</button>
          <button class="tab-plus" type="button" id="addRiftTab" aria-label="Add Rift tab">+</button>
        </div>
      </div>
      <div class="top-right">
        <button class="icon-btn" id="topSearchBtn" type="button" aria-label="Search menu" aria-haspopup="true" aria-expanded="false">
          <i class="search-icon fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        </button>

        <div class="top-menu" id="topMenu" hidden role="menu" aria-label="Where would you like to go?">
          <div class="top-menu-title">Where would you like to go?</div>
          <button class="suggestion" type="button" role="menuitem" data-value="games">
            <strong>Games</strong>
            <small>launch, resume, favorites</small>
          </button>
          <button class="suggestion" type="button" role="menuitem" data-value="browser">
            <strong>Browser</strong>
            <small>tabs, proxy, engines</small>
          </button>
          <button class="suggestion" type="button" role="menuitem" data-value="music">
            <strong>Music</strong>
            <small>search, playlists</small>
          </button>
          <button class="suggestion" type="button" role="menuitem" data-value="cloud gaming">
            <strong>Cloud Gaming</strong>
            <small>providers, sessions</small>
          </button>
        </div>
      </div>
    </div>

    <nav class="side-nav" aria-label="Left navigation">
      <button class="icon-btn" type="button" aria-label="Home">
        <i class="search-icon fa-solid fa-house" aria-hidden="true"></i>
      </button>
      <button class="icon-btn" type="button" aria-label="Games">
        <i class="search-icon fa-solid fa-gamepad" aria-hidden="true"></i>
      </button>
      <button class="icon-btn" type="button" aria-label="Browser">
        <i class="search-icon fa-solid fa-globe" aria-hidden="true"></i>
      </button>
      <div class="side-divider"></div>
      <button class="icon-btn" type="button" aria-label="Music">
        <i class="search-icon fa-solid fa-music" aria-hidden="true"></i>
      </button>
      <div class="side-spacer"></div>
      <button class="icon-btn" type="button" aria-label="Settings">
        <i class="search-icon fa-solid fa-gear" aria-hidden="true"></i>
      </button>
    </nav>

    <div class="page">
      <div class="sessions" id="sessions">
        <section class="session-view" data-session="1">
          <div class="title-wrap">
            <h1 class="top-title" data-split aria-label="rift v2">rift v2</h1>
          </div>
          <div class="search-wrap">
            <div class="search-box">
              <i class="search-icon fa-solid fa-magnifying-glass" aria-hidden="true"></i>
              <input
                class="search-input"
                type="text"
                placeholder="Search for anything."
                autocomplete="off"
                spellcheck="false"
                aria-label="Search"
              >
            </div>

            <div class="suggestions" hidden role="listbox" aria-label="Suggestions">
              <button class="suggestion" type="button" role="option" data-value="games">
                <strong>Games</strong>
                <small>launch, resume, favorites</small>
              </button>
              <button class="suggestion" type="button" role="option" data-value="browser">
                <strong>Browser</strong>
                <small>tabs, proxy, engines</small>
              </button>
              <button class="suggestion" type="button" role="option" data-value="music">
                <strong>Music</strong>
                <small>search, playlists</small>
              </button>
              <button class="suggestion" type="button" role="option" data-value="cloud gaming">
                <strong>Cloud Gaming</strong>
                <small>providers, sessions</small>
              </button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <template id="sessionTemplate">
    <section class="session-view" data-session="X" hidden>
      <div class="title-wrap">
        <h1 class="top-title" data-split aria-label="rift v2">rift v2</h1>
      </div>
      <div class="search-wrap">
        <div class="search-box">
          <i class="search-icon fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <input
            class="search-input"
            type="text"
            placeholder="Search for anything."
            autocomplete="off"
            spellcheck="false"
            aria-label="Search"
          >
        </div>

        <div class="suggestions" hidden role="listbox" aria-label="Suggestions">
          <button class="suggestion" type="button" role="option" data-value="games">
            <strong>Games</strong>
            <small>launch, resume, favorites</small>
          </button>
          <button class="suggestion" type="button" role="option" data-value="browser">
            <strong>Browser</strong>
            <small>tabs, proxy, engines</small>
          </button>
          <button class="suggestion" type="button" role="option" data-value="music">
            <strong>Music</strong>
            <small>search, playlists</small>
          </button>
          <button class="suggestion" type="button" role="option" data-value="cloud gaming">
            <strong>Cloud Gaming</strong>
            <small>providers, sessions</small>
          </button>
        </div>
      </div>
    </section>
  </template>

  <script defer src="./assets/js/home.js"></script>
</body>
</html>
