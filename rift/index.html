<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rift v2 / rift</title>
  <style>
    @font-face {
      font-family: "Leoscar Sans";
      src: url("../assets/Leoscar%20Sans%20Serif.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Leoscar Sans", Arial, sans-serif;
    }

    .wrap {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .panel {
      width: min(760px, 92vw);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
      padding: 18px 18px 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
      letter-spacing: 0.08em;
      text-transform: lowercase;
    }

    p {
      margin: 0;
      opacity: 0.72;
      line-height: 1.5;
      font-family: Arial, sans-serif;
    }

    .hint {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.10);
      opacity: 0.75;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>rift</h1>
      <p>This is the /rift page. Replace this with your real Rift interface.</p>
      <p class="hint">If you want “sessions” here too, we can reuse the same home shell and build out spaces.</p>
    </div>
  </div>
</body>
</html>
