<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rift v2 / rift</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
  <style>
    @font-face {
      font-family: "Leoscar Sans";
      src: url("../assets/Leoscar%20Sans%20Serif.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Leoscar Sans", Arial, sans-serif;
    }

    .wrap {
      height: 100%;
      display: grid;
      place-items: start center;
      padding: 10vh 28px 28px;
    }

    .panel {
      width: min(1060px, 94vw);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
      padding: 18px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .features {
      display: grid;
      gap: 12px;
      padding-right: 6px;
    }

    .feature-btn {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      padding: 16px 16px 14px;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.92);
      box-shadow:
        0 16px 28px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .feature-btn:hover,
    .feature-btn:focus-visible {
      outline: none;
      transform: translateY(-2px);
      border-color: rgba(216, 160, 111, 0.55);
      background: rgba(216, 160, 111, 0.08);
      box-shadow:
        0 20px 36px rgba(0, 0, 0, 0.7),
        0 0 0 4px rgba(216, 160, 111, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .feature-btn strong {
      display: block;
      font-size: 1.18rem;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      font-weight: 400;
      margin-bottom: 6px;
    }

    .feature-meta {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 0.96rem;
      opacity: 0.72;
      line-height: 1.35;
    }

    .feature-icon {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      flex: 0 0 auto;
    }

    .feature-icon .material-symbols-rounded {
      font-size: 26px;
      line-height: 1;
      color: rgba(255, 255, 255, 0.88);
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .rift-search {
      margin-top: 16px;
      width: min(520px, 100%);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 18px;
      background: #1e1e1e;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 10px 26px rgba(0, 0, 0, 0.65),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .search-box:focus-within {
      border-color: rgba(216, 160, 111, 0.52);
      box-shadow:
        0 12px 32px rgba(0, 0, 0, 0.72),
        0 0 0 4px rgba(216, 160, 111, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .search-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: rgba(255, 255, 255, 0.74);
      opacity: 0.9;
    }

    .material-symbols-rounded.search-icon {
      font-size: 22px;
      line-height: 1;
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .search-input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 1.05rem;
      letter-spacing: 0.01em;
      padding: 2px 0;
      font-family: Arial, sans-serif;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.48);
    }

    .title {
      display: flex;
      justify-content: flex-start;
      margin: 0 0 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      letter-spacing: 0.08em;
      text-transform: lowercase;
      font-weight: 400;
    }

    h1 .letter {
      position: relative;
      display: inline-block;
      padding: 0 0.04em;
      -webkit-text-stroke: 1.25px rgba(255, 255, 255, 0.22);
      text-shadow:
        1px 0 0 rgba(0, 0, 0, 0.72),
        -1px 0 0 rgba(0, 0, 0, 0.72),
        0 1px 0 rgba(0, 0, 0, 0.72),
        0 -1px 0 rgba(0, 0, 0, 0.72),
        1px 1px 0 rgba(0, 0, 0, 0.55),
        -1px 1px 0 rgba(0, 0, 0, 0.55),
        1px -1px 0 rgba(0, 0, 0, 0.55),
        -1px -1px 0 rgba(0, 0, 0, 0.55);
    }

    h1 .space {
      width: 0.34em;
      padding: 0;
    }

    p {
      margin: 0;
      opacity: 0.72;
      line-height: 1.5;
      font-family: Arial, sans-serif;
    }

    .hint {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.10);
      opacity: 0.75;
      font-size: 0.95rem;
    }

    .sub {
      text-align: left;
      margin: 0 0 10px;
      opacity: 0.78;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .title {
        justify-content: center;
      }

      .sub,
      .rift-search {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="layout">
        <div class="features" aria-label="Features">
          <button class="feature-btn" type="button" data-key="games">
            <span class="feature-icon" aria-hidden="true"><span class="material-symbols-rounded">sports_esports</span></span>
            <div>
              <strong>games</strong>
              <span class="feature-meta" data-count="games">0 games</span>
            </div>
          </button>
          <button class="feature-btn" type="button" data-key="browser">
            <span class="feature-icon" aria-hidden="true"><span class="material-symbols-rounded">language</span></span>
            <div>
              <strong>browser</strong>
              <span class="feature-meta" data-count="browser">0 sites</span>
            </div>
          </button>
          <button class="feature-btn" type="button" data-key="music">
            <span class="feature-icon" aria-hidden="true"><span class="material-symbols-rounded">music_note</span></span>
            <div>
              <strong>music</strong>
              <span class="feature-meta" data-count="music">0 playlists</span>
            </div>
          </button>
          <button class="feature-btn" type="button" data-key="cloud_gaming">
            <span class="feature-icon" aria-hidden="true"><span class="material-symbols-rounded">cloud</span></span>
            <div>
              <strong>cloud gaming</strong>
              <span class="feature-meta" data-count="cloud_gaming">0 providers</span>
            </div>
          </button>
          <button class="feature-btn" type="button" data-key="library">
            <span class="feature-icon" aria-hidden="true"><span class="material-symbols-rounded">bookmark</span></span>
            <div>
              <strong>library</strong>
              <span class="feature-meta" data-count="library">0 saved</span>
            </div>
          </button>
        </div>

        <div>
          <div class="title">
            <h1 id="riftTitle" aria-label="welcome to the rift">welcome to the rift</h1>
          </div>
          <p class="sub">where would you like to begin?</p>
          <div class="rift-search" aria-label="Rift search">
            <div class="search-box">
              <span class="search-icon material-symbols-rounded" aria-hidden="true">search</span>
              <input class="search-input" type="text" placeholder="Search for anything." autocomplete="off" spellcheck="false" aria-label="Search">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const title = document.getElementById("riftTitle");
    if (title) {
      const text = title.textContent || "";
      title.textContent = "";
      for (const ch of text) {
        const span = document.createElement("span");
        span.className = ch === " " ? "letter space" : "letter";
        span.textContent = ch;
        title.appendChild(span);
      }
    }

    const COUNTS = {
      games: "0 games",
      browser: "0 sites",
      music: "0 playlists",
      cloud_gaming: "0 providers",
      library: "0 saved"
    };

    document.querySelectorAll("[data-count]").forEach((el) => {
      const key = el.getAttribute("data-count");
      if (!key) return;
      if (COUNTS[key] != null) el.textContent = COUNTS[key];
    });
  </script>
</body>
</html>
