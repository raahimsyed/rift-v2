<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rift v2 / rift</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/fonts.css">
  <link rel="stylesheet" href="../assets/css/rift.css">
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="layout">
        <div class="features" aria-label="Features">
          <button class="feature-btn" type="button" data-key="games">
            <span class="feature-icon" aria-hidden="true"><i class="fa-solid fa-gamepad"></i></span>
            <div>
              <strong>games</strong>
              <span class="feature-meta" data-count="games">0 games</span>
            </div>
          </button>
          <button class="feature-btn" type="button" data-key="browser">
            <span class="feature-icon" aria-hidden="true"><i class="fa-solid fa-globe"></i></span>
            <div>
              <strong>browser</strong>
              <span class="feature-meta" data-count="browser">0 sites</span>
            </div>
          </button>
          <button class="feature-btn" type="button" data-key="music">
            <span class="feature-icon" aria-hidden="true"><i class="fa-solid fa-music"></i></span>
            <div>
              <strong>music</strong>
              <span class="feature-meta" data-count="music">0 playlists</span>
            </div>
          </button>
          <button class="feature-btn" type="button" data-key="cloud_gaming">
            <span class="feature-icon" aria-hidden="true"><i class="fa-solid fa-cloud"></i></span>
            <div>
              <strong>cloud gaming</strong>
              <span class="feature-meta" data-count="cloud_gaming">0 providers</span>
            </div>
          </button>
          <button class="feature-btn" type="button" data-key="library">
            <span class="feature-icon" aria-hidden="true"><i class="fa-solid fa-bookmark"></i></span>
            <div>
              <strong>library</strong>
              <span class="feature-meta" data-count="library">0 saved</span>
            </div>
          </button>
        </div>

        <div>
          <div class="title">
            <h1 id="riftTitle" aria-label="welcome to the rift">welcome to the rift</h1>
          </div>
          <p class="sub">where would you like to begin?</p>
          <div class="rift-search" aria-label="Rift search">
            <div class="search-box">
              <i class="search-icon fa-solid fa-magnifying-glass" aria-hidden="true"></i>
              <input class="search-input" type="text" placeholder="Search for anything." autocomplete="off" spellcheck="false" aria-label="Search">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script defer src="../assets/js/rift.js"></script>
</body>
</html>
