<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rift v2 / rift</title>
  <style>
    @font-face {
      font-family: "Leoscar Sans";
      src: url("../assets/Leoscar%20Sans%20Serif.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Leoscar Sans", Arial, sans-serif;
    }

    .wrap {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .panel {
      width: min(760px, 92vw);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
      padding: 18px 18px 16px;
    }

    .title {
      display: flex;
      justify-content: center;
      margin: 0 0 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      letter-spacing: 0.08em;
      text-transform: lowercase;
      font-weight: 400;
    }

    h1 .letter {
      position: relative;
      display: inline-block;
      padding: 0 0.04em;
      -webkit-text-stroke: 1.25px rgba(255, 255, 255, 0.22);
      text-shadow:
        1px 0 0 rgba(0, 0, 0, 0.72),
        -1px 0 0 rgba(0, 0, 0, 0.72),
        0 1px 0 rgba(0, 0, 0, 0.72),
        0 -1px 0 rgba(0, 0, 0, 0.72),
        1px 1px 0 rgba(0, 0, 0, 0.55),
        -1px 1px 0 rgba(0, 0, 0, 0.55),
        1px -1px 0 rgba(0, 0, 0, 0.55),
        -1px -1px 0 rgba(0, 0, 0, 0.55);
    }

    h1 .space {
      width: 0.34em;
      padding: 0;
    }

    p {
      margin: 0;
      opacity: 0.72;
      line-height: 1.5;
      font-family: Arial, sans-serif;
    }

    .hint {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.10);
      opacity: 0.75;
      font-size: 0.95rem;
    }

    .sub {
      text-align: center;
      margin: 0;
      opacity: 0.78;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="title">
        <h1 id="riftTitle" aria-label="welcome to the rift">welcome to the rift</h1>
      </div>
      <p class="sub">where would you like to begin?</p>
      <p class="hint">This is the /rift page placeholder. Replace this with your real Rift interface.</p>
    </div>
  </div>

  <script>
    const title = document.getElementById("riftTitle");
    if (title) {
      const text = title.textContent || "";
      title.textContent = "";
      for (const ch of text) {
        const span = document.createElement("span");
        span.className = ch === " " ? "letter space" : "letter";
        span.textContent = ch;
        title.appendChild(span);
      }
    }
  </script>
</body>
</html>
